<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>TLS Recon Tester - Terminal Demo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #1a1a2e;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        .terminal-container {
            width: 100%;
            max-width: 900px;
            background: #0d0d0d;
            border-radius: 12px;
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.5);
            overflow: hidden;
        }

        .terminal-header {
            background: linear-gradient(180deg, #3d3d3d 0%, #2d2d2d 100%);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .terminal-btn {
            width: 14px;
            height: 14px;
            border-radius: 50%;
        }

        .terminal-btn.close { background: #ff5f57; }
        .terminal-btn.minimize { background: #ffbd2e; }
        .terminal-btn.maximize { background: #28ca41; }

        .terminal-title {
            flex: 1;
            text-align: center;
            color: #999;
            font-size: 13px;
            font-weight: 500;
        }

        .terminal-body {
            padding: 20px;
            font-family: 'SF Mono', 'Monaco', 'Inconsolata', 'Fira Code', monospace;
            font-size: 13px;
            line-height: 1.5;
            color: #e0e0e0;
            height: 700px;
            overflow-y: auto;
        }

        .terminal-body::-webkit-scrollbar {
            width: 8px;
        }

        .terminal-body::-webkit-scrollbar-track {
            background: #1a1a1a;
        }

        .terminal-body::-webkit-scrollbar-thumb {
            background: #444;
            border-radius: 4px;
        }

        .cyan { color: #00d4d4; }
        .green { color: #00ff00; }
        .red { color: #ff4444; }
        .yellow { color: #ffff00; }
        .white { color: #ffffff; font-weight: bold; }
        .dim { color: #888; }

        .line {
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .prompt {
            color: #00ff00;
        }

        .input {
            color: #ffffff;
        }

        .separator {
            color: #00d4d4;
        }

        .section-header {
            color: #00d4d4;
            display: block;
            margin: 10px 0;
        }

        .hidden {
            display: none;
        }

        .cursor {
            display: inline-block;
            width: 8px;
            height: 16px;
            background: #00ff00;
            animation: blink 1s step-end infinite;
            vertical-align: middle;
        }

        @keyframes blink {
            50% { opacity: 0; }
        }

        .replay-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #00d4d4;
            color: #000;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .replay-btn:hover {
            background: #00ffff;
            transform: translateY(-2px);
        }
    </style>
</head>

        function addLine(html) {
            const line = document.createElement('div');
            line.className = 'line';
            line.innerHTML = html;
            terminal.appendChild(line);
            terminal.scrollTop = terminal.scrollHeight;
        }

        function runDemo() {
            if (currentLine >= lines.length) return;

            const lineData = lines[currentLine];
            addLine(lineData.text);
            currentLine++;

            if (currentLine < lines.length) {
                const timeout = setTimeout(runDemo, lineData.delay);
                timeouts.push(timeout);
            }
        }

        function replay() {
            // Clear all pending timeouts
            timeouts.forEach(t => clearTimeout(t));
            timeouts = [];
            
            // Reset
            terminal.innerHTML = '';
            currentLine = 0;
            
            // Start demo
            setTimeout(runDemo, 500);
        }

        // Start demo on load
        window.addEventListener('load', () => {
            setTimeout(runDemo, 1000);
